# Piston — self-hosted code-execution sandbox for the assessment platform.
# (Judge0 CE was the first choice but its isolate sandbox requires cgroup v1,
# which modern WSL2 no longer supports; Piston runs fine on cgroup v2.)
#
# Language runtimes are installed once via scripts/setup-piston.ts.

services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston_api
    restart: always
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /tmp:exec

  db:
    image: postgres:15
    container_name: learndb_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learndb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: learndb_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  piston-packages:
  pgdata:
